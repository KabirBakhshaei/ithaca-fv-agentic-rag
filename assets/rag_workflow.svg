<svg width="680" height="640" viewBox="0 0 680 640" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ITHACA-FV Agentic RAG — agentic workflow</title>
<desc>Flowchart of the LangGraph workflow. query_analyzer decides whether to retrieve. retriever fetches from ChromaDB. relevance_grader decides: relevant docs go to generator, no relevant docs go to query_rewriter (if retries left) or directly to generator (if max retries reached). query_rewriter always loops back to retriever. generator produces the final answer.</desc>

<style>
  text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
  .th  { font-size: 14px; font-weight: 600; }
  .ts  { font-size: 12px; font-weight: 400; fill: #555; }
  .arr { stroke: #888; stroke-width: 1.3; fill: none; }
  .dash{ stroke: #bbb; stroke-width: 1; stroke-dasharray: 5 3; fill: none; }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#bbb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══ NODES ═══ -->

<!-- START  bottom=66 -->
<rect x="230" y="28" width="220" height="38" rx="19" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="52" text-anchor="middle">User question</text>

<!-- query_analyzer  y=86  bottom=144  cx=340  left=170  right=510 -->
<rect x="170" y="86" width="340" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="109" text-anchor="middle" fill="#3C3489">query_analyzer</text>
<text class="ts" x="340" y="130" text-anchor="middle" fill="#534AB7">Classify · decide retrieval · rewrite query</text>

<!-- retriever  y=174  bottom=232  cx=280  left=150  right=410 -->
<rect x="150" y="174" width="260" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="280" y="197" text-anchor="middle" fill="#085041">retriever</text>
<text class="ts" x="280" y="218" text-anchor="middle" fill="#0F6E56">ChromaDB cosine similarity top-k</text>

<!-- relevance_grader  y=262  bottom=320  cx=280  left=150  right=410 -->
<rect x="150" y="262" width="260" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="280" y="285" text-anchor="middle" fill="#3C3489">relevance_grader</text>
<text class="ts" x="280" y="306" text-anchor="middle" fill="#534AB7">LLM scores each chunk YES / NO</text>

<!-- query_rewriter  y=370  bottom=428  cx=128  left=28  right=228 -->
<rect x="28" y="370" width="200" height="58" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="128" y="393" text-anchor="middle" fill="#633806">query_rewriter</text>
<text class="ts" x="128" y="414" text-anchor="middle" fill="#854F0B">Rewrite query (max 2 retries)</text>

<!-- generator  y=448  bottom=506  cx=430  left=310  right=640 -->
<rect x="310" y="448" width="330" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="475" y="471" text-anchor="middle" fill="#085041">generator</text>
<text class="ts" x="475" y="492" text-anchor="middle" fill="#0F6E56">Synthesise answer + cite sources</text>

<!-- END  y=544  cx=475 -->
<rect x="315" y="544" width="320" height="38" rx="19" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="475" y="568" text-anchor="middle" fill="#27500A">Final answer + citations</text>

<!-- ═══ ARROWS — verified against agent.py ═══ -->

<!-- 1. START → query_analyzer -->
<line x1="340" y1="66" x2="340" y2="86" class="arr" marker-end="url(#a)"/>

<!-- 2. query_analyzer → retriever  (needs_retrieval=True, left branch) -->
<line x1="280" y1="144" x2="280" y2="174" class="arr" marker-end="url(#a)"/>
<text class="ts" x="286" y="162" fill="#666">needs retrieval</text>

<!-- 3. query_analyzer → generator  (needs_retrieval=False, skip straight to generator)
     from qa right (510,115) → right → down → generator top  -->
<path d="M510 115 L620 115 L620 470 L640 470" class="dash" marker-end="url(#d)"/>
<text class="ts" x="515" y="108" fill="#999">skip retrieval</text>

<!-- 4. retriever → relevance_grader  (always) -->
<line x1="280" y1="232" x2="280" y2="262" class="arr" marker-end="url(#a)"/>

<!-- 5. relevance_grader → generator  CASE A: relevant docs found
     from grader right (410,280) → right → down → generator left (310,477) -->
<path d="M410 280 L470 280 L470 477 L310 477" class="arr" marker-end="url(#a)"/>
<text class="ts" x="415" y="273" fill="#666">relevant docs found</text>

<!-- 6. relevance_grader → generator  CASE B: max retries exhausted
     from grader right (410,306) → right → down → generator left at 494
     NOTE: this edge is also on relevance_grader (NOT query_rewriter) per agent.py line 157-161 -->
<path d="M410 306 L560 306 L560 494 L640 494" class="dash" marker-end="url(#d)"/>
<text class="ts" x="415" y="316" fill="#999">max retries exhausted</text>

<!-- 7. relevance_grader → query_rewriter  (no relevant docs, retries remain)
     from grader left (150,291) → left → down → rewriter top -->
<path d="M150 291 L70 291 L70 370" class="dash" marker-end="url(#d)"/>
<text class="ts" x="145" y="334" text-anchor="end" fill="#999">no relevant docs</text>

<!-- 8. query_rewriter → retriever  (ALWAYS loops back — the ONLY edge from rewriter)
     per agent.py line 164: graph.add_edge("query_rewriter", "retriever")
     from rewriter bottom (128,428) → down → left → up to retriever left (150,203) -->
<path d="M128 428 L128 446 L140 446 L140 203 L150 203" class="dash" marker-end="url(#d)"/>
<text class="ts" x="134" y="444" fill="#999">retry</text>

<!-- 9. generator → END -->
<line x1="475" y1="506" x2="475" y2="544" class="arr" marker-end="url(#a)"/>

<!-- ═══ LEGEND ═══ -->
<line x1="40" y1="604" x2="56" y2="604" class="arr" marker-end="url(#a)"/>
<text class="ts" x="62" y="608">main path</text>
<line x1="160" y1="604" x2="176" y2="604" class="dash" marker-end="url(#d)"/>
<text class="ts" x="182" y="608">conditional / optional</text>
<rect x="340" y="598" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="358" y="608">LLM node</text>
<rect x="430" y="598" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="448" y="608">data / retrieval</text>
<rect x="548" y="598" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="566" y="608">self-correction</text>
</svg>
