<svg width="680" height="480" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ITHACA-FV Agentic RAG — component stack</title>
<desc>Structural diagram: Gradio UI talks to LangGraph agent. LangGraph calls the LLM and queries ChromaDB. ChromaDB was built from the ITHACA-FV knowledge base using the embedding model. Arrows show the direction of data flow at query time and ingestion time.</desc>

<style>
  text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
  .th  { font-size: 14px; font-weight: 600; }
  .ts  { font-size: 12px; font-weight: 400; }
  .arr { stroke: #888; stroke-width: 1.3; fill: none; }
  .ing { stroke: #aaa; stroke-width: 1; stroke-dasharray: 5 3; fill: none; }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="d" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 1: Gradio UI  y=20  bottom=80 -->
<rect x="40" y="20" width="600" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="340" y="43" text-anchor="middle" fill="#712B13">Gradio Web UI</text>
<text class="ts" x="340" y="64" text-anchor="middle" fill="#993C1D">Chat interface · port 7860 · PDF upload · image upload · SSH tunnel / public URL</text>

<!-- arrow: UI sends question to agent -->
<line x1="340" y1="80" x2="340" y2="100" class="arr" marker-end="url(#a)"/>

<!-- Layer 2: LangGraph  y=100  bottom=160 -->
<rect x="40" y="100" width="600" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="123" text-anchor="middle" fill="#3C3489">LangGraph agentic workflow</text>
<text class="ts" x="340" y="144" text-anchor="middle" fill="#534AB7">query_analyzer  →  retriever  →  relevance_grader  →  query_rewriter  →  generator</text>

<!-- arrow: agent calls LLM (left, x=200) -->
<line x1="200" y1="160" x2="200" y2="180" class="arr" marker-end="url(#a)"/>
<!-- arrow: agent queries ChromaDB (right, x=480) -->
<line x1="480" y1="160" x2="480" y2="180" class="arr" marker-end="url(#a)"/>

<!-- Layer 3a: LLM  x=40  y=180  w=290  bottom=260 -->
<rect x="40" y="180" width="290" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="185" y="206" text-anchor="middle" fill="#085041">LLM backend</text>
<text class="ts" x="185" y="226" text-anchor="middle" fill="#0F6E56">vLLM + Gemma 4 31B  (HPC · 2×H100)</text>
<text class="ts" x="185" y="246" text-anchor="middle" fill="#0F6E56">Ollama · OpenRouter  (laptop / cloud)</text>

<!-- Layer 3b: ChromaDB  x=350  y=180  w=290  bottom=260 -->
<rect x="350" y="180" width="290" height="80" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="495" y="206" text-anchor="middle" fill="#085041">ChromaDB vector store</text>
<text class="ts" x="495" y="226" text-anchor="middle" fill="#0F6E56">Local · on-disk · cosine similarity</text>
<text class="ts" x="495" y="246" text-anchor="middle" fill="#0F6E56">6 402 vectors from ITHACA-FV</text>

<!-- arrow: ChromaDB uses embeddings to compute similarity -->
<line x1="495" y1="260" x2="495" y2="280" class="arr" marker-end="url(#a)"/>

<!-- Layer 4: Embeddings  x=350  y=280  w=290  bottom=340 -->
<rect x="350" y="280" width="290" height="58" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="495" y="303" text-anchor="middle" fill="#3C3489">Embeddings model</text>
<text class="ts" x="495" y="322" text-anchor="middle" fill="#534AB7">BAAI/bge-large-en-v1.5 · sentence-transformers · CUDA</text>

<!-- 
  INGESTION path (dashed, one-time setup):
  Knowledge Base → Embeddings → ChromaDB
  arrow from KB top (495,360) up to Embeddings bottom (495,338) 
-->
<path d="M495 360 L495 338" class="ing" marker-end="url(#d)"/>

<!-- Layer 5: Knowledge base  y=360  bottom=420 -->
<rect x="40" y="360" width="600" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text class="th" x="340" y="383" text-anchor="middle">Knowledge base — ITHACA-FV GitHub repository</text>
<text class="ts" x="340" y="404" text-anchor="middle" fill="#5F5E5A">Markdown docs · C++ headers (.H) · C++ sources (.C) · Python tutorials · cloned locally</text>

<!-- legend -->
<line x1="40" y1="446" x2="56" y2="446" class="arr" marker-end="url(#a)"/>
<text class="ts" x="62" y="450">query-time data flow</text>
<line x1="240" y1="446" x2="256" y2="446" class="ing" marker-end="url(#d)"/>
<text class="ts" x="262" y="450">ingestion (one-time setup: python scripts/ingest.py)</text>
</svg>
